# Fix Vim ESC delay (tmux 3.5+ already defaults to 10ms)
set -sg escape-time 0
 
# Increase scrollback buffer
set -g history-limit 50000
 
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
 
# Enable mouse support
set -g mouse on
 
# Enable focus events for vim autoread
set -g focus-events on
 
# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
 
# Aggressive resize for multi-client
setw -g aggressive-resize on
 
# ============================================
# KEY BINDINGS
# ============================================
 
# Change prefix to Ctrl+a (more ergonomic)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix
 
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
 
# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
 
# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
 
# ============================================
# APPEARANCE
# ============================================
 
# Status bar position
set -g status-interval 1
set -g status-position bottom
set -g status-justify left

# Solid Light Blue bar with dark text
set -g status-style "bg=#89b4fa,fg=#11111b"

# Left status: Session name
set -g status-left-length 30
set -g status-left "#[bold] #S #[nobold]| "

# Right status to working directory
set -g status-right "#[fg=#11111b,bold]#{=/-20/...:pane_current_path} "

# Active window tab (Dark background so it stands out against light blue)
setw -g window-status-current-style "fg=#89b4fa,bg=#11111b,bold"
setw -g window-status-current-format " #I:#W#F "

# Inactive window tabs
setw -g window-status-style "fg=#11111b,bg=#89b4fa"
setw -g window-status-format " #I:#W#F "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
 
